<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Award Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #121212;
            color: #F8E4A1;
            margin: 0;
            padding: 20px;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #FFC107;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #FFC107;
            background-color: #1F1F1F;
            color: #F8E4A1;
        }
        button {
            background-color: #FFC107;
            color: black;
            padding: 10px;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #FFD54F;
        }
        .success {
            display: none;
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Travel Award Application</h1>
    <form id="application-form" action="https://formspree.io/f/mnjogjvd" method="POST">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="destination">Destination:</label>
        <input type="text" id="destination" name="destination" required>

        <label for="travel-dates">Travel Dates:</label>
        <input type="text" id="travel-dates" name="travel_dates" required>

        <label for="passengers">Passengers:</label>
        <input type="number" id="passengers" name="passengers" min="1" required>

        <label for="cabin-class">Cabin Class:</label>
        <select id="cabin-class" name="cabin_class" required>
            <option value="economy">Economy</option>
            <option value="business">Business</option>
            <option value="first">First</option>
        </select>

        <label for="points-programs">Points Programs:</label>
        <input type="text" id="points-programs" name="points_programs">

        <label for="total-points">Total Points:</label>
        <input type="number" id="total-points" name="total_points">

        <label for="notes">Additional Notes:</label>
        <textarea id="notes" name="notes"></textarea>

        <button type="submit">Submit</button>
    </form>
    <div class="success" id="success-message">Thank you for your application!</div>

    <script>
        const form = document.getElementById('application-form');
        const successMessage = document.getElementById('success-message');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(form);
            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    form.reset();
                    successMessage.style.display = 'block';
                } else {
                    alert('There was a problem with your submission.');
                }
            }).catch(error => {
                alert('There was a problem with your submission.');
            });
        });
    </script>
</body>
</html>
