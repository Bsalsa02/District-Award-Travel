<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Orbitron">
    <style>
        body {
            font-family: 'Orbitron', sans-serif;
            background-color: #121212;
            color: #FFC300;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            border: 1px solid #FFC300;
            border-radius: 8px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #FFC300;
            border-radius: 4px;
            background-color: #1E1E1E;
            color: #FFC300;
        }
        button {
            background-color: #FFC300;
            color: #121212;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .points-programs {
            display: flex;
            flex-direction: column;
        }
        .points-program {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
    </style>
    <title>Travel Application</title>
</head>
<body>
    <div class="container">
        <h2>Travel Application Form</h2>
        <form id="travelForm">
            <label for="destination">Destination:</label>
            <input type="text" id="destination" name="destination" required>

            <label for="date">Date:</label>
            <input type="date" id="date" name="date" required>

            <label for="adults">Adults:</label>
            <select id="adults" name="adults">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
            </select>

            <label for="children">Children:</label>
            <select id="children" name="children">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
            </select>

            <div class="points-programs">
                <h4>Points Programs:</h4>
                <div class="points-program">
                    <input type="checkbox" id="transferable" name="transferable">
                    <label for="transferable">Transferable Points</label>
                </div>
                <div class="points-program">
                    <input type="checkbox" id="airline" name="airline">
                    <label for="airline">Airline Programs</label>
                </div>
                <div class="points-program">
                    <input type="checkbox" id="hotel" name="hotel">
                    <label for="hotel">Hotel Programs</label>
                </div>
            </div>

            <label for="pointsLedger">Points Ledger:</label>
            <input type="text" id="pointsLedger" name="pointsLedger" readonly>

            <button type="submit">Submit</button>
        </form>
    </div>
    <script>
        const form = document.getElementById('travelForm');
        const pointsLedger = document.getElementById('pointsLedger');
        const calculateTotal = () => {
            const adultCount = parseInt(document.getElementById('adults').value) || 0;
            const childrenCount = parseInt(document.getElementById('children').value) || 0;
            const totalPoints = (adultCount * 100) + (childrenCount * 50);
            pointsLedger.value = totalPoints;
        };

        form.addEventListener('change', calculateTotal);
    </script>
</body>
</html>
